name: Publish to npm

# Auto-publish on every push to main. The next patch version is computed from
# whatever is currently on npm and published — you never bump the version by
# hand; just push code. Nothing is committed back to git, so there is no bot
# commit and no need to pull after pushing.
#
# NOTE: every push to main publishes a new version (yes, even docs-only pushes).
# The version field in package.json is not the source of truth here — npm is.
#
# Auth uses npm Trusted Publishing (OIDC) — no token or secret, and it satisfies
# the account's 2FA. One-time setup (see README "Publishing"):
#   1. Publish the package once manually so it exists on npm.
#   2. npmjs.com -> the package -> Settings -> Trusted Publisher -> add:
#        Provider: GitHub Actions,  user: asset1gmo,
#        repository: remotion-kit,  workflow: publish.yml

on:
  push:
    branches: [main]

# Serialize runs so two quick pushes can't race to the same version number.
concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1; runners still ship npm 10.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build

      - name: Compute next version and publish
        run: |
          NAME="$(node -p "require('./package.json').name")"
          # Current latest on npm; empty if the package isn't published yet.
          LATEST="$(npm view "$NAME" version 2>/dev/null || true)"
          if [ -z "$LATEST" ]; then
            NEXT="$(node -p "require('./package.json').version")"
            echo "Not yet on npm — publishing package.json version $NEXT"
          else
            NEXT="$(node -e "const v='$LATEST'.split('.'); v[2]=(+v[2]+1); console.log(v.join('.'))")"
            echo "Latest on npm is $LATEST — publishing $NEXT"
          fi
          npm pkg set version="$NEXT"   # workspace only; not committed
          npm publish --access public
